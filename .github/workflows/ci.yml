name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild JS bundle and site
        run: npm run ci

      - name: Upload built site (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/
